# DigitalOcean App Platform spec for MindBridge.
#
# One-time deploy:
#   1. Push this repo to GitHub (already done for vnmoorthy/mindbridge).
#   2. In the DigitalOcean console: Apps -> Create App -> pick this repo, OR run
#        doctl apps create --spec .do/app.yaml
#   3. Add your inference key as an app-level SECRET named MINDBRIDGE_INFERENCE_KEY
#      (App Platform -> Settings -> App-Level Environment Variables). Without it,
#      the app still runs in self-contained demo mode.
name: mindbridge
region: nyc
services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: vnmoorthy/mindbridge
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    routes:
      - path: /
    health_check:
      http_path: /api/health
    envs:
      - key: MINDBRIDGE_MODEL
        scope: RUN_TIME
        value: llama3.3-70b-instruct
      # Set this as a SECRET in the dashboard rather than committing it:
      # - key: MINDBRIDGE_INFERENCE_KEY
      #   scope: RUN_TIME
      #   type: SECRET
